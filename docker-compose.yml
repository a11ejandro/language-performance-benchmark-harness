version: "3.9"

services:
  postgres:
    image: postgres:17.6
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: benchmark_development
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8.2
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  golang_worker:
    build:
      context: ./golang_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: benchmark_development
      REDIS_URL: redis://redis:6379/0
      WORKER_QUEUE: go
    command: ["--service"]

  golang_worker_test:
    build:
      context: ./golang_worker
      target: build
    command: ["go", "test", "./..."]

  node_worker:
    build:
      context: ./node_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: benchmark_development
      REDIS_URL: redis://redis:6379/0
      WORKER_QUEUE: node
    command: ["node", "worker.js", "--service"]

  python_worker:
    build:
      context: ./python_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: benchmark_development
      REDIS_URL: redis://redis:6379/0
      WORKER_QUEUE: python
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-1}
      CELERY_PREFETCH_MULTIPLIER: ${CELERY_PREFETCH_MULTIPLIER:-1}
    command: ["bash", "-lc", "celery -A celery_app.app worker -Q ${WORKER_QUEUE:-python} -l info --concurrency=${CELERY_CONCURRENCY:-1} --prefetch-multiplier=${CELERY_PREFETCH_MULTIPLIER:-1}"]

  python_worker_api:
    build:
      context: ./python_worker
    depends_on:
      - python_worker
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: benchmark_development
      REDIS_URL: redis://redis:6379/0
      WORKER_QUEUE: python
      PYTHON_WORKER_HOST: 0.0.0.0
      PYTHON_WORKER_PORT: 5000
    ports:
      - "5001:5000"
    command: ["bash", "-lc", "flask --app server run --host ${PYTHON_WORKER_HOST:-0.0.0.0} --port ${PYTHON_WORKER_PORT:-5000}"]

  benchmark_ui:
    build:
      context: ./benchmark_ui
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/benchmark_development
      REDIS_URL: redis://redis:6379/0
      PYTHON_WORKER_URL: http://python_worker_api:5000/enqueue
    volumes:
      # Persist generated CSVs/figures back into the repo when running article:* tasks.
      - ./benchmark_ui/docs:/rails/docs
    ports:
      - "3000:3000"
    command: ["bash", "-lc", "bundle exec rails server -b 0.0.0.0 -p 3000"]

  sidekiq:
    build:
      context: ./benchmark_ui
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      RAILS_LOG_TO_STDOUT: "true"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/benchmark_development
      REDIS_URL: redis://redis:6379/0
      PYTHON_WORKER_URL: http://python_worker_api:5000/enqueue
    volumes:
      - ./benchmark_ui/docs:/rails/docs
    command: ["bash", "-lc", "bundle exec sidekiq -C config/sidekiq.yml"]

volumes:
  pgdata:
